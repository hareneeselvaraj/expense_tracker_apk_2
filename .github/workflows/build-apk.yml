name: Build Android APK

on:
  push:
    branches: [read-from-messages]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 13114758

      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web assets to Android (manual)
        run: |
          rm -rf android/app/src/main/assets/public
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo "✓ Web assets copied to Android"
          ls -la android/app/src/main/assets/public/ | head -20

      - name: Update Capacitor plugins
        run: npx cap update android || echo "⚠ cap update failed, continuing with Gradle build"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: List generated APKs
        run: find android/app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: android/app/build/outputs/apk/
          retention-days: 30
